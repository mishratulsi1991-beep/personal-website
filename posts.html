<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Posts — Tulsi Mishra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <script src="posts_data.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #0f62fe;
      --accent:    #6929c4;
      --ss-orange: #ff6719;
      --text:      #1a1a2e;
      --muted:     #5a5a7a;
      --bg:        #f4f6fb;
      --white:     #ffffff;
      --border:    #e4e8f0;
      --radius:    14px;
      --shadow:    0 4px 24px rgba(15,98,254,.08);
      --shadow-lg: 0 14px 44px rgba(15,98,254,.15);
      --font:      'Inter', system-ui, sans-serif;
      --font-d:    'Playfair Display', Georgia, serif;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    /* ── TOPBAR ─────────────────────────────────────────── */
    .topbar {
      background: rgba(13,13,34,.96);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.08);
      position: sticky; top: 0; z-index: 200;
    }
    .topbar::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1.5px;
      background: linear-gradient(90deg, transparent, rgba(15,98,254,.55) 30%, rgba(105,41,196,.5) 70%, transparent);
      pointer-events: none;
    }
    .topbar-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 2rem;
      height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .topbar-left { display: flex; align-items: center; gap: 1.25rem; }
    .back-link {
      font-size: .82rem; font-weight: 600; color: rgba(255,255,255,.55);
      display: flex; align-items: center; gap: .4rem; transition: color .2s;
    }
    .back-link:hover { color: #fff; }
    .topbar-title {
      font-size: .92rem; font-weight: 700; color: #fff;
      display: flex; align-items: center; gap: .5rem;
    }
    .topbar-badge {
      font-size: .68rem; font-weight: 800;
      background: linear-gradient(135deg, var(--ss-orange), #ff9a5c);
      color: #fff; padding: .2rem .65rem; border-radius: 100px; letter-spacing: .02em;
    }
    .ss-count-badge {
      font-size: .72rem; font-weight: 700; color: rgba(255,255,255,.5);
    }

    /* ── HERO ────────────────────────────────────────────── */
    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 55%, #0f62fe 100%);
      color: #fff; padding: 3.5rem 2rem 3rem;
    }
    .hero-inner { max-width: 1200px; margin: 0 auto; }
    .hero-label {
      font-size: .68rem; font-weight: 800; letter-spacing: .18em; text-transform: uppercase;
      color: rgba(255,255,255,.5); margin-bottom: .75rem;
    }
    .hero h1 {
      font-family: var(--font-d); font-size: clamp(1.9rem, 4vw, 2.8rem);
      margin-bottom: .75rem; line-height: 1.15;
    }
    .hero p { font-size: 1rem; color: rgba(255,255,255,.7); max-width: 580px; line-height: 1.65; margin-bottom: 1.75rem; }
    .hero-cta {
      display: inline-flex; align-items: center; gap: .55rem;
      padding: .55rem 1.4rem; border-radius: 100px; font-size: .88rem; font-weight: 700;
      background: var(--ss-orange); color: #fff;
      transition: transform .2s, box-shadow .2s;
    }
    .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,103,25,.4); }
    .hero-cta svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

    /* ── PAGE BODY ───────────────────────────────────────── */
    .page-body { max-width: 1200px; margin: 0 auto; padding: 2.5rem 2rem 5rem; }

    /* ── SUBSTACK GRID ───────────────────────────────────── */
    .ss-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.4rem;
    }

    /* ── SUBSTACK CARD ───────────────────────────────────── */
    .ss-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow); display: flex; flex-direction: column;
      transition: transform .25s, box-shadow .25s;
      position: relative;
    }
    .ss-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--ss-orange), #ff9a5c);
    }
    .ss-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
    .ss-card-img {
      width: 100%; height: 190px;
      background: linear-gradient(135deg, #fff3ee, #ffe4d2);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem; flex-shrink: 0; overflow: hidden;
    }
    .ss-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ss-card-body { padding: 1.4rem; flex: 1; display: flex; flex-direction: column; gap: .7rem; }
    .ss-card-meta { display: flex; align-items: center; gap: .65rem; font-size: .75rem; color: var(--muted); flex-wrap: wrap; }
    .ss-card-date { font-weight: 500; }
    .ss-read-time {
      display: flex; align-items: center; gap: .3rem;
      background: #fff3ee; color: var(--ss-orange); font-weight: 700;
      padding: .15rem .5rem; border-radius: 100px; font-size: .7rem;
    }
    .ss-card-title {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4; color: var(--text);
    }
    .ss-card-excerpt { font-size: .87rem; color: var(--muted); line-height: 1.65; flex: 1; }
    .ss-card-foot { padding: 0 1.4rem 1.25rem; }
    .ss-open-btn {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .78rem; font-weight: 700; color: var(--ss-orange);
      background: #fff3ee; padding: .4rem .95rem; border-radius: 100px;
      transition: all .2s;
    }
    .ss-open-btn:hover { background: var(--ss-orange); color: #fff; }

    /* ── LOADING / EMPTY STATES ──────────────────────────── */
    .state-box {
      grid-column: 1 / -1;
      text-align: center; padding: 5rem 2rem; color: var(--muted);
    }
    .state-box .state-icon { font-size: 2.8rem; display: block; margin-bottom: 1rem; }
    .state-box h3 { font-size: 1.15rem; color: var(--text); margin-bottom: .5rem; }
    .state-box p { font-size: .88rem; line-height: 1.6; max-width: 440px; margin: 0 auto .6rem; }
    .state-box code { font-size: .8rem; background: #e8ecf4; padding: .2rem .5rem; border-radius: 4px; }
    .state-box a { color: var(--ss-orange); font-weight: 600; text-decoration: underline; }
    .spinner {
      display: inline-block; width: 36px; height: 36px;
      border: 3px solid #e4e8f0; border-top-color: var(--ss-orange);
      border-radius: 50%; animation: spin .75s linear infinite; margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LOAD MORE ───────────────────────────────────────── */
    .load-more-wrap { text-align: center; margin-top: 2.5rem; }
    .load-more-btn {
      font-size: .85rem; font-weight: 700; padding: .65rem 2rem; border-radius: 100px;
      border: 2px solid var(--ss-orange); color: var(--ss-orange);
      background: transparent; cursor: pointer; font-family: var(--font);
      transition: all .2s;
    }
    .load-more-btn:hover { background: var(--ss-orange); color: #fff; }

    /* ── FOOTER ──────────────────────────────────────────── */
    footer {
      background: #0d0d22; color: rgba(255,255,255,.35);
      text-align: center; padding: 1.5rem 2rem; font-size: .82rem;
    }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 900px) { .ss-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) {
      .ss-grid { grid-template-columns: 1fr; }
      .hero { padding: 2.5rem 1.25rem 2rem; }
      .page-body { padding: 1.5rem 1rem 4rem; }
      .topbar-inner { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<!-- ── TOPBAR ────────────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-left">
      <a href="index.html" class="back-link">&#8592; Back to site</a>
      <span class="topbar-title">
        ✍️ Posts
        <span class="topbar-badge">Substack</span>
        <span class="ss-count-badge" id="topbar-count"></span>
      </span>
    </div>
  </div>
</div>

<!-- ── HERO ──────────────────────────────────────────────────── -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-label">Writing &amp; Thinking</div>
    <h1>My Articles &amp; Posts</h1>
    <p>Thoughts on HPC, AI, product management, stoicism, and life — published on Substack.</p>
    <a id="ss-hero-link" href="#" target="_blank" class="hero-cta">
      <svg viewBox="0 0 24 24"><path d="M22.539 8.242H1.46V5.406h21.08v2.836zM1.46 10.812V24L12 18.11 22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.08V0z"/></svg>
      Follow on Substack
    </a>
  </div>
</div>

<!-- ── PAGE BODY ──────────────────────────────────────────────── -->
<div class="page-body">
  <div class="ss-grid" id="ss-grid">
    <div class="state-box">
      <span class="spinner"></span>
      <h3>Fetching posts…</h3>
      <p>Loading your articles from Substack.</p>
    </div>
  </div>
  <div class="load-more-wrap" id="ss-load-more" style="display:none">
    <button class="load-more-btn" onclick="loadMore()">Load more articles ↓</button>
  </div>
</div>

<!-- ── FOOTER ─────────────────────────────────────────────────── -->
<footer>
  <p>© 2026 Tulsi Mishra · Articles from Substack</p>
</footer>

<script>
const data    = window.POSTS_DATA || { substack: {} };
const SS_PAGE = 6;
let ssItems   = [];
let ssShown   = SS_PAGE;

// Boot
(function init() {
  const cfg = data.substack || {};
  if (cfg.publicUrl) document.getElementById('ss-hero-link').href = cfg.publicUrl;
  fetchSubstack(cfg.rssUrl, cfg.publicUrl);
})();

async function fetchSubstack(rssUrl, publicUrl) {
  const grid = document.getElementById('ss-grid');

  if (!rssUrl) {
    grid.innerHTML = `
      <div class="state-box">
        <span class="state-icon">✍️</span>
        <h3>Substack not configured</h3>
        <p>Set your RSS URL in <code>posts_data.js</code> — e.g. <code>https://yourname.substack.com/feed</code></p>
      </div>`;
    return;
  }

  // Try via CORS proxy first, then direct
  const sources = [
    `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`,
    rssUrl
  ];

  for (const src of sources) {
    try {
      const res  = await fetch(src);
      let xmlText;
      if (src.includes('allorigins')) {
        const json = await res.json();
        xmlText = json.contents;
      } else {
        xmlText = await res.text();
      }
      const xml = new DOMParser().parseFromString(xmlText, 'text/xml');
      ssItems   = parseFeed(xml);
      if (ssItems.length === 0) continue;

      document.getElementById('topbar-count').textContent = `· ${ssItems.length} articles`;
      ssShown = SS_PAGE;
      render();
      return;
    } catch { /* try next */ }
  }

  // All failed
  grid.innerHTML = `
    <div class="state-box">
      <span class="state-icon">⚠️</span>
      <h3>Couldn't load posts</h3>
      <p>Check that your Substack URL is correct in <code>posts_data.js</code>.</p>
      ${publicUrl ? `<p><a href="${esc(publicUrl)}" target="_blank">Visit your Substack directly ↗</a></p>` : ''}
    </div>`;
}

function parseFeed(xml) {
  return [...xml.querySelectorAll('item')].map(item => {
    const title   = item.querySelector('title')?.textContent?.trim() || '';
    const link    = item.querySelector('link')?.textContent?.trim() || '';
    const pubDate = item.querySelector('pubDate')?.textContent || '';
    const desc    = item.querySelector('description')?.textContent || '';
    const content = item.querySelector('encoded')?.textContent || desc;

    const tmp = document.createElement('div');
    tmp.innerHTML = content;
    const plain   = (tmp.textContent || '').replace(/\s+/g, ' ').trim();
    const excerpt = plain.slice(0, 200) + (plain.length > 200 ? '…' : '');

    let image = null;
    const imgMatch = content.match(/<img[^>]+src=["']([^"']+)["']/i);
    if (imgMatch) image = imgMatch[1];

    let dateStr = '';
    try { dateStr = new Date(pubDate).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); }
    catch { dateStr = pubDate.split(' ').slice(1, 4).join(' '); }

    const words    = plain.split(/\s+/).length;
    const readTime = Math.max(1, Math.round(words / 200));

    return { title, link, date: dateStr, excerpt, image, readTime };
  });
}

function render() {
  const grid = document.getElementById('ss-grid');
  const more = document.getElementById('ss-load-more');
  const slice = ssItems.slice(0, ssShown);
  grid.innerHTML = '';
  slice.forEach(a => grid.appendChild(buildCard(a)));
  more.style.display = ssItems.length > ssShown ? 'block' : 'none';
}

function loadMore() {
  ssShown += SS_PAGE;
  render();
}

function buildCard(a) {
  const card = document.createElement('div');
  card.className = 'ss-card';
  card.innerHTML = `
    <div class="ss-card-img">
      ${a.image
        ? `<img src="${esc(a.image)}" alt="${esc(a.title)}" loading="lazy" onerror="this.parentElement.innerHTML='✍️'">`
        : '✍️'}
    </div>
    <div class="ss-card-body">
      <div class="ss-card-meta">
        <span class="ss-card-date">${esc(a.date)}</span>
        <span class="ss-read-time">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${a.readTime} min read
        </span>
      </div>
      <div class="ss-card-title">${esc(a.title)}</div>
      <div class="ss-card-excerpt">${esc(a.excerpt)}</div>
    </div>
    <div class="ss-card-foot">
      <a href="${esc(a.link)}" target="_blank" class="ss-open-btn">Read on Substack ↗</a>
    </div>`;
  return card;
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
